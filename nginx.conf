##############################################################################
# Nginx configuration for hosting multiple apps on http://84.235.253.142
#
# Each app gets its own location block. The pattern is:
#   /app-name/api  → proxied to its Node.js backend (strips the /app-name prefix)
#   /app-name      → served from the built static files
#
# Steps to deploy:
#   1. Build the frontend:  cd frontend && npm run build
#      Output lands in: frontend/dist/dhanam-tracker/
#   2. Copy that folder to the server path configured in `alias` below.
#   3. Start the backend on its port (default 5000).
#   4. Place/include this file in /etc/nginx/conf.d/ or inside an http {} block.
##############################################################################

server {
    listen 80;
    server_name 84.235.253.142;

    # -------------------------------------------------------------------------
    # App 1 — Dhanam Tracker
    # -------------------------------------------------------------------------

    # API — proxy to the Node.js backend; strip /dhanam-tracker prefix first
    location /dhanam-tracker/api/ {
        proxy_pass         http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Static files — serve the Vite build output
    location /dhanam-tracker/ {
        alias /var/www/dhanam-tracker/;   # <-- path where you copied frontend/dist/dhanam-tracker/
        try_files $uri $uri/ /dhanam-tracker/index.html;
    }

    # Redirect bare /dhanam-tracker (no trailing slash) to /dhanam-tracker/
    location = /dhanam-tracker {
        return 301 /dhanam-tracker/;
    }

    # -------------------------------------------------------------------------
    # App 2 — Future app (template — duplicate this block for each new app)
    # -------------------------------------------------------------------------

    # location /other-future-app/api/ {
    #     proxy_pass         http://127.0.0.1:5001/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    # }

    # location /other-future-app/ {
    #     alias /var/www/other-future-app/;
    #     try_files $uri $uri/ /other-future-app/index.html;
    # }

    # location = /other-future-app {
    #     return 301 /other-future-app/;
    # }
}
